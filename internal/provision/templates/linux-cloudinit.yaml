#cloud-config
# Grow the root partition + filesystem to fill the Incus-provisioned disk.
# `root.size` extends /dev/sda, but the Incus-built Ubuntu cloud image ships
# /dev/sda2 sized to the image (~20 GiB) and its cloud-init doesn't grow it
# on first boot — without this, df stays at 20G even on a 75 GiB volume.
bootcmd:
  - growpart /dev/sda 2 || true
  - resize2fs /dev/sda2 || true
package_update: true
# krapow base toolchain: aiming for parity with what GitHub-hosted
# ubuntu-latest ships pre-installed. The package list below is GitHub's
# vital + common + cmd sets from actions/runner-images verbatim
# (images/ubuntu/toolsets/toolset-2404.json) — the same set GitHub
# installs into its ubuntu-24.04 runner image via install-apt-vital.sh
# and install-apt-common.sh. Update by re-fetching that JSON when we
# bump base image versions. Language toolchains (rust/node/python/etc.)
# are installed by workflows via actions/setup-*; project-specific
# system libs (libwebkit2gtk, etc.) are also up to the workflow.
packages:
  # vital — GitHub's install-apt-vital.sh set
  - bzip2
  - curl
  - g++
  - gcc
  - make
  - jq
  - tar
  - unzip
  - wget
  # common — GitHub's apt.common_packages set
  - autoconf
  - automake
  - dbus
  - dnsutils
  - dpkg
  - dpkg-dev
  - fakeroot
  - fonts-noto-color-emoji
  - gnupg2
  - iproute2
  - iputils-ping
  - libyaml-dev
  - libtool
  - libssl-dev
  - libsqlite3-dev
  - locales
  - mercurial
  - openssh-client
  - p7zip-rar
  - pkg-config
  - python-is-python3
  - rpm
  - texinfo
  - tk
  - tree
  - tzdata
  - upx-ucl  # noble removed the `upx` virtual package; upx-ucl is the binary
  - xvfb
  - xz-utils
  - zsync
  # cmd — GitHub's apt.cmd_packages set
  - acl
  - aria2
  - binutils
  - bison
  - brotli
  - libnss3-tools
  - coreutils
  - file
  - findutils
  - flex
  - ftp
  - haveged
  - lz4
  - m4
  - mediainfo
  - netcat-openbsd  # noble dropped the `netcat` metapackage
  - net-tools
  - p7zip-full
  - parallel
  - patchelf
  - pigz
  - pollinate
  - rsync
  - shellcheck
  - sphinxsearch
  - sqlite3
  - ssh
  - sshpass
  - sudo
  - systemd-coredump
  - swig
  - telnet
  - time
  - zip
  # krapow-specific additions (not in GitHub's apt lists):
  # - ca-certificates is a transitive dep of curl but make it explicit
  # - build-essential bundles g++/gcc/make/libc6-dev/dpkg-dev — overlap
  #   with the vital set but pulls libc6-dev which linkers need
  # - LLVM metapackages installed via apt rather than GitHub's versioned
  #   install-clang.sh path. We need llvm-ar as a workaround for the
  #   binutils 2.42 (Ubuntu 24.04) ar bug on large .a files.
  - ca-certificates
  - build-essential
  - llvm
  - clang
  - lld
  # GitHub CLI — release workflows shell out to `gh release create` etc.
  # GitHub installs from cli.github.com; the universe package is a few
  # minor versions behind but functionally equivalent for CI use.
  - gh
  # git — GitHub installs from ppa:git-core/ppa via install-git.sh, which
  # is why it's not in their apt.vital list. The noble main `git` package
  # is current enough for actions/checkout and gh-based release flows.
  - git
write_files:
  - path: /opt/krapow-bootstrap.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euxo pipefail
      id runner || useradd -m -s /bin/bash runner
      # Grant passwordless sudo so workflow steps can `sudo apt install ...`
      # without prompting — matches GitHub-hosted ubuntu-latest behavior.
      install -m 0440 /dev/stdin /etc/sudoers.d/runner <<<'runner ALL=(ALL) NOPASSWD: ALL'
      mkdir -p /opt/actions-runner
      chown runner:runner /opt/actions-runner
      cd /opt/actions-runner
      case "$(uname -m)" in
        x86_64)  RARCH=x64 ;;
        aarch64) RARCH=arm64 ;;
        *) echo "unsupported arch"; exit 1 ;;
      esac
      VER=$(curl -fsSL https://api.github.com/repos/actions/runner/releases/latest | jq -r .tag_name | sed 's/^v//')
      sudo -u runner curl -fsSLO "https://github.com/actions/runner/releases/download/v${VER}/actions-runner-linux-${RARCH}-${VER}.tar.gz"
      sudo -u runner tar xzf "actions-runner-linux-${RARCH}-${VER}.tar.gz"
      ./bin/installdependencies.sh
      sudo -u runner ./config.sh --unattended --replace \
        --url "{{.RepoURL}}" --token "{{.RegToken}}" \
        --name "{{.Name}}" --labels "{{.Labels}}"
      ./svc.sh install runner
      ./svc.sh start
runcmd:
  - /opt/krapow-bootstrap.sh
